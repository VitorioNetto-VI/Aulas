                suggestedAnswer: "O candidato deve esclarecer que Git e GitHub não são sinônimos. O Git é a ferramenta de controle de versão instalada localmente na máquina do usuário, responsável por armazenar snapshots do projeto, gerenciar branches e permitir que o trabalho seja versionado mesmo offline. O GitHub, por sua vez, é a plataforma web que hospeda esses repositórios Git remotos, adicionando camadas de colaboração social, como Pull Requests e Issues. Portanto, ter uma conta no GitHub não substitui a instalação do Git local.\n\nAlém disso, o candidato deve propor a adoção do GitHub Flow para evitar conflitos no branch principal. O fluxo deve seguir os passos: 1) Criar um branch isolado (feature branch) para cada nova funcionalidade; 2) Realizar commits frequentes e descritivos; 3) Abrir um Pull Request quando a funcionalidade estiver pronta; 4) Discutir e revisar o código com a equipe (Code Review); 5) Realizar o merge e o deploy apenas após a aprovação da equipe."
            },
            {
                id: 18, type: 'discursive',
                title: "Questão 18 – Merge vs Rebase",
                situation: "Durante uma revisão de código (Code Review) em uma startup, dois desenvolvedores discutem a melhor forma de integrar um branch de funcionalidade (feature/nova) ao branch principal (main). O Desenvolvedor A sugere o uso de git merge, argumentando que é a prática padrão para Pull Requests e preserva o contexto histórico das alterações. O Desenvolvedor B, preocupado com a estética do histórico, sugere que todos os desenvolvedores utilizem git rebase no branch feature/nova antes de cada push, para manter o histórico linear. No entanto, o branch feature/nova já é compartilhado e utilizado por outros membros da equipe para testes.",
                texts: [
                    "Texto I: 'Merge vs Rebase: Merge preserva histórico completo de branches, ideal para Pull Requests em equipe. Rebase cria histórico linear e limpo, ideal para limpar commits locais antes de push.'",
                    "Texto II: 'Aviso: Nunca faça rebase em branches compartilhados com outros membros da equipe. Isso reescreve o histórico e pode causar conflitos graves.'"
                ],
                axes: "Explique a diferença fundamental entre as operações de Merge e Rebase no que tange à preservação do histórico do projeto. Analise a sugestão do Desenvolvedor B à luz das boas práticas apresentadas no texto, justificando os riscos de sua proposta para a equipe.",
                limit: 30,
                suggestedAnswer: "O candidato deve explicar que a operação de Merge preserva o histórico completo do projeto, incluindo os pontos de bifurcação e o contexto dos branches, sendo a prática recomendada para Pull Requests em equipe. Em contrapartida, o Rebase reescreve o histórico de commits para torná-lo linear e limpo, sendo útil apenas para organizar commits locais antes de enviá-los ao repositório remoto.\n\nAo analisar a sugestão do Desenvolvedor B, o candidato deve concluir que ela é extremamente perigosa e contraindicada. O texto alerta explicitamente que nunca se deve fazer Rebase em branches compartilhados (como o feature/nova do cenário). Como a operação reescreve o histórico local, ao tentar sincronizar essas alterações com o repositório remoto onde outros colegas já basearam seu trabalho, a equipe enfrentará conflitos graves de histórico e duplicação de commits, comprometendo a integridade do trabalho colaborativo."
            },
            {
                id: 19, type: 'discursive',
                title: "Questão 19 – Refatoração e Testes de Caracterização",
                situation: "Uma equipe de manutenção de software foi designada para modernizar um sistema legado em Python. O sistema possui uma classe central complexa, com métodos extensos e dependências de entradas aleatórias, que nunca foi testada anteriormente. O gerente do projeto, pressionado por prazos, sugere que a equipe comece imediatamente a refatorar o código para torná-lo mais legível, dividindo os métodos em funções menores. A desenvolvedora sênior da equipe, no entanto, vetou a proposta, afirmando que 'refatorar sem testes é como reformar uma casa sem alicerces' e propôs uma etapa preliminar antes de qualquer alteração estrutural.",
                texts: [
                    "Texto I: 'A refatoração sem testes é como reformar uma casa sem alicerces: qualquer mudança pode causar danos invisíveis. Testes automatizados fornecem a rede de segurança necessária para modificar código com confiança.'",
                    "Texto II: 'Testes de caracterização: Quando enfrentamos código legado sem testes, o primeiro passo é criar testes de caracterização. Eles capturam o comportamento atual do sistema, permitindo que identifiquemos bugs e comportamentos inesperados antes de começar a refatorar.'"
                ],
                axes: "Justifique a posição da desenvolvedora sênior, explicando o conceito de 'rede de segurança' no contexto de manutenção de software. Descreva o que são 'testes de caracterização' e qual é o seu papel no processo de refatoração de código legado.",
                limit: 30,
                suggestedAnswer: "O candidato deve justificar a posição da desenvolvedora sênior explicando que refatorar código sem testes automatizados é uma prática arriscada, comparável a 'reformar uma casa sem alicerces'. Os testes atuam como uma 'rede de segurança' essencial, pois validam o comportamento do código a cada alteração, garantindo que a melhoria estrutural não introduza 'danos invisíveis' ou quebre funcionalidades existentes que só seriam notadas em produção.\n\nEm seguida, o candidato deve definir os 'testes de caracterização' como o primeiro passo obrigatório ao lidar com código legado sem testes. Esses testes não buscam validar se o código está 'correto' idealmente, mas sim capturar e documentar rigorosamente o comportamento atual do sistema. Eles permitem que a equipe identifique bugs e comportamentos inesperados antes de iniciar a refatoração, servindo como base confiável para as mudanças."
            },
            {
                id: 20, type: 'discursive',
                title: "Questão 20 – Cobertura de Testes e Mocks",
                situation: "Após a implementação de uma suíte de testes automatizados com pytest em um módulo legado, a equipe de desenvolvimento decidiu analisar a cobertura de testes para identificar áreas que ainda precisavam de atenção. O relatório gerado apresentou uma cobertura de 90% em comandos (Stmts), mas apenas 40% em desvios (Branch). Além disso, um dos testes falhava intermitentemente porque dependia da geração de um número aleatório e da leitura de uma entrada externa, o que tornava o resultado do teste imprevisível a cada execução.",
                texts: [
                    "Texto I: 'Cobertura de testes: A cobertura mede qual porcentagem do seu código é exercida pelos testes. Não é uma métrica perfeita, mas ajuda a identificar áreas não testadas. Métricas: Stmts, Miss, Cover, Branch.'",
                    "Texto II: 'Usando Mocks com pytest-mock: Isolar dependências externas (input, random, etc.).'"
                ],
                axes: "Interprete a discrepância entre a alta cobertura de comandos (Stmts) e a baixa cobertura de desvios (Branch) no relatório de cobertura. Explique como o uso de mocks (com pytest-mock) pode resolver o problema da intermitência nos testes, detalhando a importância do isolamento de dependências externas.",
                limit: 30,
                suggestedAnswer: "O candidato deve interpretar que a discrepância entre as métricas indica que, embora a maioria das linhas de código esteja sendo executada durante os testes (alta cobertura de Stmts), os testes não estão explorando os diferentes caminhos lógicos e condicionais do programa (baixa cobertura de Branch). Isso significa que estruturas como if/else ou loops possuem ramificações que nunca são testadas, deixando lacunas na validação do comportamento do software.\n\nPara resolver a intermitência do teste, o candidato deve explicar que o uso de mocks (através do pytest-mock) é fundamental para isolar dependências externas e imprevisíveis, como a geração de números aleatórios (random) ou entradas de usuário (input). Ao simular o comportamento dessas dependências e retornar valores fixos e controlados, o mock garante que o teste seja determinístico, executando sempre da mesma forma e validando apenas a lógica interna da unidade em questão, sem interferências do ambiente externo."
            }
        ];

        let currentQuestion = 0;
        let userAnswers = new Array(20).fill(null);
        let userDiscursiveAnswers = new Array(20).fill('');
        let answeredQuestions = new Set();

        function formatText(text) {
            return text.replace(/\n\n/g, '</p><p class="mt-4">').replace(/\n/g, '<br>');
        }

        function renderQuestion() {
            const container = document.getElementById('quiz-container');
            const q = questionsData[currentQuestion];
            const letters = ['A', 'B', 'C', 'D'];
            
            container.innerHTML = '';
            container.className = 'fade-in';

            // Badge de tipo
            const typeBadge = q.type === 'multiple' 
                ? '<span class="inline-block px-3 py-1 rounded-full text-xs font-semibold bg-blue-500/20 text-blue-300 border border-blue-500/30 mb-4">Múltipla Escolha</span>'
                : '<span class="inline-block px-3 py-1 rounded-full text-xs font-semibold bg-purple-500/20 text-purple-300 border border-purple-500/30 mb-4">Discursiva</span>';

            let html = `
                <div class="mb-6">
                    ${typeBadge}
                    <h2 class="text-lg md:text-xl font-bold text-white mb-4">${q.type === 'discursive' ? q.title : `Questão ${q.id}`}</h2>
                    <div class="text-slate-300 leading-relaxed text-sm md:text-base">
                        <p>${formatText(q.text || q.situation)}</p>
                    </div>
                </div>
            `;

            if (q.type === 'multiple') {
                html += `<div class="space-y-3">`;
                q.options.forEach((opt, idx) => {
                    const isSelected = userAnswers[currentQuestion] === idx;
                    const isAnswered = answeredQuestions.has(currentQuestion);
                    let btnClass = 'option-btn w-full text-left p-4 rounded-lg border-2 border-slate-700 bg-slate-800/50 flex items-start gap-3';
                    
                    if (isAnswered) {
                        if (idx === q.correct) btnClass += ' correct';
                        else if (isSelected && idx !== q.correct) btnClass += ' wrong';
                    } else if (isSelected) {
                        btnClass += ' selected';
                    }

                    html += `
                        <button class="${btnClass}" onclick="selectOption(${idx})" ${isAnswered ? 'disabled' : ''}>
                            <span class="letter-badge bg-slate-700 text-amber-400 ${isAnswered && idx === q.correct ? 'bg-emerald-600 text-white' : ''} ${isAnswered && isSelected && idx !== q.correct ? 'bg-red-600 text-white' : ''}">${letters[idx]}</span>
                            <span class="pt-1">${opt}</span>
                        </button>
                    `;
                });
                html += `</div>`;

                // Botão confirmar
                if (!answeredQuestions.has(currentQuestion) && userAnswers[currentQuestion] !== null) {
                    html += `
                        <button onclick="confirmAnswer()" class="mt-6 w-full py-3 rounded-lg font-bold bg-emerald-600 hover:bg-emerald-500 text-white transition-colors">
                            Confirmar Resposta
                        </button>
                    `;
                }

                // Explicação
                if (answeredQuestions.has(currentQuestion)) {
                    const isCorrect = userAnswers[currentQuestion] === q.correct;
                    html += `
                        <div class="mt-6 p-4 rounded-lg border ${isCorrect ? 'bg-emerald-900/30 border-emerald-500/50' : 'bg-red-900/30 border-red-500/50'}">
                            <div class="flex items-center gap-2 mb-2">
                                <span class="text-xl">${isCorrect ? '✅' : '❌'}</span>
                                <span class="font-bold ${isCorrect ? 'text-emerald-400' : 'text-red-400'}">${isCorrect ? 'Correto!' : 'Incorreto'}</span>
                            </div>
                            <p class="text-slate-300 text-sm">${q.explanation}</p>
                        </div>
                    `;
                }
            } else {
                // Discursiva
                if (q.texts) {
                    html += `<div class="mt-6 space-y-3">`;
                    q.texts.forEach((t, i) => {
                        html += `
                            <div class="p-4 rounded-lg bg-slate-800/50 border border-slate-700">
                                <p class="text-slate-300 text-sm italic">${t}</p>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }

                html += `
                    <div class="mt-6 p-4 rounded-lg bg-amber-500/10 border border-amber-500/30">
                        <p class="text-amber-300 text-sm font-semibold mb-1">📝 Eixos a desenvolver:</p>
                        <p class="text-slate-300 text-sm">${q.axes}</p>
                        <p class="text-slate-400 text-xs mt-2">Limite: máximo de ${q.limit} linhas.</p>
                    </div>

                    <textarea 
                        id="discursive-answer" 
                        class="discursive-textarea w-full mt-4 p-4 rounded-lg bg-slate-800 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-amber-500 transition-colors"
                        placeholder="Escreva sua resposta dissertativa aqui..."
                        oninput="saveDiscursiveAnswer(this.value)"
                    >${userDiscursiveAnswers[currentQuestion] || ''}</textarea>
                `;

                // Botão ver sugestão
                const answerBoxId = `answer-box-${currentQuestion}`;
                const isOpen = answeredQuestions.has(currentQuestion);
                html += `
                    <button onclick="toggleAnswer('${answerBoxId}')" class="mt-4 w-full py-3 rounded-lg font-medium bg-purple-600 hover:bg-purple-500 text-white transition-colors flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                        ${isOpen ? 'Ocultar Sugestão de Resposta' : 'Ver Sugestão de Resposta'}
                    </button>
                    <div id="${answerBoxId}" class="answer-box ${isOpen ? 'open' : ''} mt-4 p-4 rounded-lg bg-purple-900/20 border border-purple-500/30">
                        <p class="text-purple-300 font-semibold text-sm mb-2">📖 Sugestão de Resposta:</p>
                        <p class="text-slate-300 text-sm leading-relaxed whitespace-pre-line">${q.suggestedAnswer}</p>
                    </div>
                `;
            }

            container.innerHTML = html;
            updateProgress();
            updateNavButtons();
        }

        function selectOption(idx) {
            if (answeredQuestions.has(currentQuestion)) return;
            userAnswers[currentQuestion] = idx;
            renderQuestion();
        }

        function confirmAnswer() {
            if (userAnswers[currentQuestion] === null) return;
            answeredQuestions.add(currentQuestion);
            renderQuestion();
        }

        function saveDiscursiveAnswer(value) {
            userDiscursiveAnswers[currentQuestion] = value;
        }

        function toggleAnswer(boxId) {
            const box = document.getElementById(boxId);
            box.classList.toggle('open');
            if (box.classList.contains('open')) {
                answeredQuestions.add(currentQuestion);
            }
            renderQuestion();
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / questionsData.length) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';
            document.getElementById('progress-text').textContent = `Questão ${currentQuestion + 1} de ${questionsData.length}`;
        }

        function updateNavButtons() {
            const btnPrev = document.getElementById('btn-prev');
            const btnNext = document.getElementById('btn-next');
            
            btnPrev.disabled = currentQuestion === 0;
            
            if (currentQuestion === questionsData.length - 1) {
                btnNext.textContent = 'Finalizar ✓';
            } else {
                btnNext.textContent = 'Próxima →';
            }
        }

        function nextQuestion() {
            if (currentQuestion < questionsData.length - 1) {
                currentQuestion++;
                renderQuestion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                showResults();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function showResults() {
            let correctCount = 0;
            for (let i = 0; i < 16; i++) {
                if (userAnswers[i] === questionsData[i].correct) correctCount++;
            }
            document.getElementById('final-score').textContent = `${correctCount}/16`;
            document.getElementById('result-modal').classList.remove('hidden');
        }

        function resetQuiz() {
            currentQuestion = 0;
            userAnswers = new Array(20).fill(null);
            userDiscursiveAnswers = new Array(20).fill('');
            answeredQuestions = new Set();
            document.getElementById('result-modal').classList.add('hidden');
            renderQuestion();
        }

        // Initialize
        renderQuestion();
    </script>
</body>
</html>
